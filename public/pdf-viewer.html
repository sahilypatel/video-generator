    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Sora', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* Custom scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #aaa;
        }

        /* PDF container */
        #pdf-container {
            background: #525659;
        }

        .pdf-page {
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            margin-bottom: 16px;
        }

        /* Quick action pills */
        .action-pill {
            transition: all 0.2s ease;
        }
        .action-pill:hover {
            background: #f3f4f6;
            border-color: #d1d5db;
        }

        /* Chat message animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .chat-message {
            animation: fadeIn 0.3s ease-out;
        }

        /* Typing indicator */
        .typing-dot {
            animation: typingBounce 1.4s infinite ease-in-out;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Chat input styling */
        #chat-input {
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            line-height: 1.5;
        }
        #chat-input:focus {
            box-shadow: none;
        }

        /* Custom checkbox */
        input[type="checkbox"] {
            accent-color: #374151;
        }

        /* Suggestion pill hover */
        .suggestion-pill {
            transition: all 0.15s ease;
        }
        .suggestion-pill:hover {
            background: #f9fafb;
            border-color: #d1d5db;
        }

        /* Chat input card */
        .chat-input-card {
            transition: box-shadow 0.2s ease;
        }
        .chat-input-card:focus-within {
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.15);
        }
    </style>
</head>

    <script>
        // Set PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // Get file info from URL params or localStorage
        const urlParams = new URLSearchParams(window.location.search);
        const fileName = urlParams.get('file') || localStorage.getItem('pdfFileName') || 'document.pdf';
        document.getElementById('file-name').textContent = fileName;

        // PDF state
        let pdfDoc = null;
        let currentPage = 1;
        let totalPages = 1;
        let zoomLevel = 1;
        let pageRendering = false;
        let pageNumPending = null;

        // Load PDF from localStorage
        async function loadPDF() {
            const pdfData = localStorage.getItem('pdfFileData');
            if (!pdfData) {
                console.log('No PDF data found in localStorage');
                return;
            }

            try {
                // Convert base64 data URL to array buffer
                const base64 = pdfData.split(',')[1];
                const binaryString = atob(base64);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }

                // Load PDF document
                const loadingTask = pdfjsLib.getDocument({ data: bytes });
                pdfDoc = await loadingTask.promise;
                totalPages = pdfDoc.numPages;
                
                document.getElementById('total-pages').textContent = totalPages;
                
                // Clear placeholder and render first page
                const viewer = document.getElementById('pdf-viewer');
                viewer.innerHTML = '';
                
                // Render all pages
                for (let i = 1; i <= totalPages; i++) {
                    await renderPage(i);
                }
            } catch (error) {
                console.error('Error loading PDF:', error);
            }
        }

        async function renderPage(pageNum) {
            const page = await pdfDoc.getPage(pageNum);
            
            // Set scale for good quality
            const scale = 1.5;
            const viewport = page.getViewport({ scale });
            
            // Create canvas for this page
            const canvas = document.createElement('canvas');
            canvas.className = 'pdf-page';
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            canvas.style.width = `${viewport.width / 1.5}px`;
            canvas.style.height = `${viewport.height / 1.5}px`;
            
            const context = canvas.getContext('2d');
            
            // Render PDF page to canvas
            const renderContext = {
                canvasContext: context,
                viewport: viewport
            };
            
            await page.render(renderContext).promise;
            
            document.getElementById('pdf-viewer').appendChild(canvas);
        }

        function changePage(delta) {
            const newPage = currentPage + delta;
            if (newPage >= 1 && newPage <= totalPages) {
                currentPage = newPage;
                document.getElementById('current-page').textContent = currentPage;
                
                // Scroll to the page
                const pages = document.querySelectorAll('.pdf-page');
                if (pages[currentPage - 1]) {
                    pages[currentPage - 1].scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            }
        }

        function changeZoom(delta) {
            zoomLevel = Math.max(0.5, Math.min(2, zoomLevel + delta));
            document.getElementById('zoom-level').textContent = Math.round(zoomLevel * 100) + '%';
            // Apply zoom to PDF viewer
            const viewer = document.getElementById('pdf-viewer');
            viewer.style.transform = `scale(${zoomLevel})`;
            viewer.style.transformOrigin = 'top center';
        }

        // Load PDF on page load
        document.addEventListener('DOMContentLoaded', loadPDF);

        // Chat functionality
        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            input.value = '';

            // Show typing indicator
            showTypingIndicator();

            // Simulate AI response after delay
            setTimeout(() => {
                hideTypingIndicator();
                const response = generateResponse(message);
                addMessage(response, 'assistant');
            }, 1500);
        }

        function askQuestion(question) {
            document.getElementById('chat-input').value = question;
            sendMessage();
        }

        function addMessage(content, role) {
            const container = document.getElementById('chat-messages');
            
            // Remove welcome message if it exists
            const welcome = container.querySelector('.text-center.py-8');
            if (welcome) welcome.remove();

            const messageDiv = document.createElement('div');
            messageDiv.className = `chat-message flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            const bubble = document.createElement('div');
            bubble.className = role === 'user' 
                ? 'max-w-[80%] px-4 py-3 bg-black text-white rounded-2xl rounded-br-md'
                : 'max-w-[80%] px-4 py-3 bg-gray-100 text-gray-800 rounded-2xl rounded-bl-md';
            bubble.innerHTML = content;
            
            if (role === 'assistant') {
                // Add citation badge for assistant messages
                const citation = document.createElement('div');
                citation.className = 'mt-2 text-xs text-gray-500 flex items-center gap-1';
                citation.innerHTML = '<svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> Pages 1-3';
                bubble.appendChild(citation);
            }
            
            messageDiv.appendChild(bubble);
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }

        function showTypingIndicator() {
            const container = document.getElementById('chat-messages');
            const indicator = document.createElement('div');
            indicator.id = 'typing-indicator';
            indicator.className = 'chat-message flex justify-start';
            indicator.innerHTML = `
                <div class="px-4 py-3 bg-gray-100 rounded-2xl rounded-bl-md flex items-center gap-1">
                    <div class="typing-dot w-2 h-2 bg-gray-400 rounded-full"></div>
                    <div class="typing-dot w-2 h-2 bg-gray-400 rounded-full"></div>
                    <div class="typing-dot w-2 h-2 bg-gray-400 rounded-full"></div>
                </div>
            `;
            container.appendChild(indicator);
            container.scrollTop = container.scrollHeight;
        }

        function hideTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();
        }

        function generateResponse(question) {
            const responses = {
                'Summarize this document': 'This document presents a comprehensive analysis of the topic. The main points include: 1) Introduction to key concepts, 2) Methodology used for analysis, 3) Key findings and results, 4) Discussion of implications, and 5) Conclusions and future work recommendations.',
